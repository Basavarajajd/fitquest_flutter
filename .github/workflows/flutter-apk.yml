name: Flutter APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Inject google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Inject firebase_options.dart
        run: |
          cat > lib/firebase_options.dart << 'DART'
          import 'package:firebase_core/firebase_core.dart';

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform => android;

            static const FirebaseOptions android = FirebaseOptions(
              apiKey: '${{ secrets.FIREBASE_API_KEY }}',
              appId: '1:491389758789:android:b93ab10af990fdf47da22c',
              messagingSenderId: '491389758789',
              projectId: 'fitquest-cf3a4',
              storageBucket: 'fitquest-cf3a4.firebasestorage.app',
            );
          }
          DART

      - name: Clean project
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fitquest-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
